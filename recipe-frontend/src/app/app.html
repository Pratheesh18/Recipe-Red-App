<div class="min-h-screen bg-[radial-gradient(circle_at_top,_#fff8ef_0%,_#f7efe1_38%,_#efe0c6_100%)] text-stone-900">
  <header class="border-b border-stone-900/10 bg-white/70 backdrop-blur">
    <div class="mx-auto flex max-w-6xl flex-col gap-4 px-4 py-4 sm:px-6 lg:flex-row lg:items-center lg:justify-between">
      <a
        routerLink="/"
        class="flex items-center justify-center gap-3 text-sm font-semibold tracking-[0.22em] text-stone-900 uppercase lg:justify-start"
      >
        <span class="inline-flex h-10 w-10 items-center justify-center rounded-2xl bg-stone-900 text-sm text-amber-100">
          RH
        </span>
        RecipeHub
      </a>

      <nav class="flex w-full flex-wrap items-center justify-center gap-2 text-sm lg:w-auto lg:justify-end">
        <a
          routerLink="/"
          routerLinkActive="bg-stone-900 text-amber-50"
          [routerLinkActiveOptions]="{ exact: true }"
          class="min-w-[5.5rem] rounded-full px-4 py-2 text-center font-medium text-stone-700 transition hover:bg-stone-900 hover:text-amber-50"
        >
          Home
        </a>

        @if (!authState().isAuthenticated) {
          <a
            routerLink="/login"
            routerLinkActive="bg-stone-900 text-amber-50"
            class="min-w-[5.5rem] rounded-full px-4 py-2 text-center font-medium text-stone-700 transition hover:bg-stone-900 hover:text-amber-50"
          >
            Login
          </a>
          <a
            routerLink="/register"
            routerLinkActive="bg-stone-900 text-amber-50"
            class="min-w-[6.5rem] rounded-full bg-amber-500 px-4 py-2 text-center font-semibold text-stone-900 transition hover:bg-amber-400"
          >
            Register
          </a>
        } @else {
          <div class="order-last w-full rounded-full border border-stone-900/10 bg-white px-4 py-2 text-center text-stone-700 sm:order-none sm:w-auto">
            {{ authState().userName }}
          </div>
          <button
            type="button"
            (click)="logout()"
            class="min-w-[6.5rem] rounded-full bg-stone-900 px-4 py-2 text-center font-semibold text-amber-50 transition hover:bg-stone-700"
          >
            Logout
          </button>
        }
      </nav>
    </div>
  </header>

  <main class="mx-auto max-w-6xl px-4 py-6 sm:px-6 sm:py-8">
    <router-outlet />
  </main>

  <app-recipe-editor-modal />
  <app-recipe-details-modal />
</div>
